# Cortex Configuration
# Copy to config.local.yaml for personal overrides (gitignored)

workspace: default

storage:
  postgres:
    dsn: postgresql://localhost:5432/cortex

embedding:
  local:
    model: BAAI/bge-small-zh-v1.5
    # dimensions must match the model output and schema vector(512)
    dimensions: 512

llm:
  openrouter:
    api_key: ${LLM_API_KEY}
    model: gemini-2.5-flash
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    chat_endpoint: /chat/completions
    thesis_list:
      - "AI Agent Infrastructure"
      - "AI Native Developer Tools"
      - "Open Source Commercialization"
      - "新能源"
      - "AI Native 应用"
      - "AI Content 与多模态娱乐化"
      - "智能硬件出海"

tag_normalization:
  bilingual_pairs:
    - ["知识管理", "knowledge management"]
    - ["开发者工具", "developer tools"]
    - ["内容创作", "content creation"]
    - ["人工智能", "artificial intelligence"]
  canonical_forms:
    "ai agent": ["ai-agent", "ai-agents", "ai agents"]
    "open source": ["open-source", "opensource"]
    "deal flow": ["deal-flow", "dealflow"]
    "knowledge management": ["knowledge-management"]
    "developer tools": ["developer-tools"]
    "note taking": ["note-taking"]

api:
  host: 127.0.0.1
  port: 8420

notifications:
  webhook:
    enabled: false
    url: ""                   # e.g. http://127.0.0.1:8421/webhook
    timeout_seconds: 10
    secret: ""                # HMAC-SHA256 signing secret
    min_priority: low         # low | medium | high

  digest_push:
    enabled: false            # set true to enable daily digest push
    cron: "0 9 * * *"        # when to push (default: 9am daily)
    days: 1                   # how many days of data to include

file_store:
  root: ~/.cortex/store
